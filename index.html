<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jesidisch Pro</title>
    
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root {
            --gemini-blue: #1d7efd;
            --gemini-purple: #8f6fff;
            --bg: #f3f7ff;
            --card: #ffffff;
            --text: #090c13;
            --sub-text: #606982;
            --border: #dce6f9;
        }

        body.dark {
            --bg: #101623;
            --card: #1e2638;
            --text: #edf3ff;
            --sub-text: #97a7ca;
            --border: #333e58;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 0; transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Style (Gemini Inspired) */
        header {
            padding: 25px 20px;
            background: var(--card);
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .gradient-text {
            font-size: 1.5rem; font-weight: bold;
            background: linear-gradient(to right, var(--gemini-blue), var(--gemini-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        /* Suchfeld */
        .search-wrapper { margin-bottom: 25px; }
        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 2px solid var(--border); background: var(--card);
            color: var(--text); font-size: 17px; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        input:focus { border-color: var(--gemini-blue); box-shadow: 0 4px 20px rgba(29, 126, 253, 0.15); }

        /* Info Bereich */
        .info-card {
            background: linear-gradient(135deg, rgba(29,126,253,0.1), rgba(143,111,255,0.1));
            padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 0.9rem;
            border: 1px solid var(--border);
        }
        .info-card a { color: var(--gemini-blue); text-decoration: none; font-weight: bold; }

        /* Wort Karten */
        .result-card {
            background: var(--card); padding: 20px; border-radius: 18px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }
        .main-word { font-weight: 600; font-size: 1.2rem; color: var(--gemini-blue); display: block; }
        .sub-word { color: var(--sub-text); font-size: 1rem; margin-top: 4px; display: block; }

        /* Action Buttons */
        .actions { display: flex; gap: 10px; }
        .icon-btn {
            background: var(--bg); border: none; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* Floating Buttons */
        .fab-container { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .fab {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: var(--gemini-blue); color: white; font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="gradient-text">Jesidisch Pro</div>
</header>

<div class="container">
    <div class="info-card">
        ☀️ <b>Wusstest du?</b> Die jesidische Kultur ist eine der ältesten der Welt. 
        <br><a href="https://de.wikipedia.org/wiki/Jesiden" target="_blank">Mehr über Jesiden erfahren →</a>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Suchen oder Übersetzen..." autocomplete="off">
    </div>

    <div id="results"></div>
</div>

<div class="fab-container">
    <button class="fab" onclick="shareApp()" title="Teilen">🔗</button>
    <button class="fab" style="background: var(--gemini-purple);" onclick="toggleMode()" title="Dark Mode">🌓</button>
</div>

<script>
    let dictionary = {};
    let favs = JSON.parse(localStorage.getItem('yazidi_favs')) || [];

    // Laden der Daten
    fetch('jesidisch.json')
        .then(res => res.json())
        .then(data => { dictionary = data; })
        .catch(() => console.log("Lade jesidisch.json..."));

    function search() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('results');
        if(!query) { container.innerHTML = ""; return; }

        let html = "";
        for(let key in dictionary) {
            if(key.toLowerCase().includes(query) || dictionary[key].toLowerCase().includes(query)) {
                const isFav = favs.includes(key) ? "⭐" : "☆";
                html += `
                    <div class="result-card">
                        <div>
                            <span class="main-word">${key}</span>
                            <span class="sub-word">${dictionary[key]}</span>
                        </div>
                        <div class="actions">
                            <button class="icon-btn" onclick="copyText('${dictionary[key]}')">📋</button>
                            <button class="icon-btn" onclick="toggleFav('${key}')">${isFav}</button>
                        </div>
                    </div>`;
            }
        }
        container.innerHTML = html || "<p style='text-align:center; color:gray;'>Kein Eintrag gefunden.</p>";
    }

    function toggleFav(word) {
        if(favs.includes(word)) favs = favs.filter(f => f !== word);
        else favs.push(word);
        localStorage.setItem('yazidi_favs', JSON.stringify(favs));
        search();
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Übersetzung kopiert!");
    }

    function toggleMode() {
        document.body.classList.toggle('dark');
    }

    async function shareApp() {
        const shareData = {
            title: 'Jesidisch Pro Wörterbuch',
            text: 'Schau dir dieses jesidische Wörterbuch an!',
            url: window.location.href
        };
        try {
            if (navigator.share) await navigator.share(shareData);
            else alert("Link kopiert: " + window.location.href);
        } catch (err) { console.log(err); }
    }

    document.getElementById('searchInput').addEventListener('input', search);
</script>

</body>
</html>
